name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK (for non-release)
        if: github.ref_type != 'tag'
        run: ./gradlew assembleDebug

      - name: Build release APK (for tags)
        if: github.ref_type == 'tag'
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketagent-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Create GitHub Release on tag
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            # PocketAgent ${{ github.ref_name }}

            ## Install

            1. Download the APK file below
            2. On your Android phone, open the APK file
            3. If prompted, allow "Install unknown apps" for your file manager
            4. Tap Install

            ## What's new

            - Initial release
            - BYOK: connect any OpenAI-compatible gateway
            - Streaming chat with reasoning support
            - Agent loop with bash, file_read, file_write, file_list, web_fetch tools
            - Sandboxed workspace at /data/data/com.pocketagent/files/workspace/
            - iOS-clean Kimi-inspired UI
            - Dark mode (system-follow)
            - Encrypted API key storage (Android Keystore)

            SHA-256 checksums are in the release assets.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SHA256 checksums
        if: github.ref_type == 'tag'
        run: |
          cd app/build/outputs/apk/release/
          for f in *.apk; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Upload checksums
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
