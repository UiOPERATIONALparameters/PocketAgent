name: Build APK

on:
  push:
    branches: [ main, v2.0 ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, v2.0 ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;35.0.0 platforms;android-35'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK (for branch pushes & PRs)
        if: github.ref_type != 'tag'
        run: ./gradlew assembleDebug

      - name: Build release APK (for tags)
        if: github.ref_type == 'tag'
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketagent-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Generate SHA256 checksums
        if: github.ref_type == 'tag'
        run: |
          cd app/build/outputs/apk/release/
          for f in *.apk; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Create GitHub Release on tag
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            # PocketAgent ${{ github.ref_name }}

            ## Install

            1. Download the APK file below (`app-release.apk`)
            2. Optionally verify the checksum: `sha256sum app-release.apk` should match `app-release.apk.sha256`
            3. On your Android phone, open the APK file
            4. If prompted, allow "Install unknown apps" for your file manager
            5. Tap Install

            ## Minimum requirements

            - Android 8.0 (API 26) or higher
            - ~150 MB free storage for the Linux bootstrap (one-time download on first launch)
            - An API key from any OpenAI-compatible provider (OpenAI, Anthropic-via-proxy, OpenRouter, z.ai, DeepSeek, Groq, Together, Ollama, vLLM, LM Studio, etc.)

            ## What's new

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/README.md#whats-new-in-v200) for the full changelog.

            ## Security

            - API keys stored encrypted via Android Keystore (AES-256-GCM)
            - No telemetry, no analytics, no crash reporting
            - Open source: audit the code at ${{ github.server_url }}/${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
